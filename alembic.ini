# Alembic configuration for the Events Service project.
#
# Expected project layout:
#
#   events.service.python/
#   ├── alembic.ini
#   ├── migrations/
#   │   ├── env.py
#   │   ├── script.py.mako
#   │   └── versions/
#   └── src/
#       └── infra/database/sqlalchemy/models.py
#
# The application reads the database URL from EVENTS_DATABASE_URL through
# src.infra.config.get_settings(). The value below is only a local fallback.

[alembic]
script_location = %(here)s/migrations

# Keep the repository root importable so env.py can import modules such as:
# from src.infra.config import get_settings
# from src.infra.database.sqlalchemy.models import Base
prepend_sys_path = .

# Local fallback. Prefer overriding this in migrations/env.py with:
# config.set_main_option("sqlalchemy.url", get_settings().database_url)
sqlalchemy.url = sqlite:///data/events.db

# Migration filenames with timestamp prefix for easier chronological ordering.
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Use OS-specific path separators.
path_separator = os

# Limit generated migration slug size.
truncate_slug_length = 60

# Revision environment is useful when env.py must load application settings
# before running revision/autogenerate commands.
revision_environment = true

# Optional: uncomment if multiple version directories are needed later.
# version_locations = %(here)s/migrations/versions

# Optional: uncomment to run post-processing hooks such as Black/Ruff.
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 88 REVISION_SCRIPT_FILENAME

[post_write_hooks]
# Post-write hooks are intentionally disabled by default to keep Alembic
# independent from optional formatter dependencies.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
